<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <meta name="theme-color" content="#fff4c7">

  <title>SASA</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      background: #f3f3f3;
      color: #222;
    }

    button {
      font: inherit;
    }

    /* หน้าแรก */
    .welcome-page {
      position: fixed;
      inset: 0;
      z-index: 10;

      min-height: 100svh;

      padding:
        calc(24px + env(safe-area-inset-top))
        24px
        calc(30px + env(safe-area-inset-bottom));

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      text-align: center;

      background:
        linear-gradient(
          160deg,
          #fffdf5 0%,
          #fff1ba 55%,
          #ffd86b 100%
        );

      transition:
        opacity 0.5s ease,
        visibility 0.5s ease,
        transform 0.5s ease;
    }

    .welcome-page.hide {
      opacity: 0;
      visibility: hidden;
      transform: translateY(-20px);
      pointer-events: none;
    }

    /* กล่องภาพ GIF */
    .gif-container {
      width: min(78vw, 360px);
      aspect-ratio: 1 / 1;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow: hidden;

      background: rgba(255, 255, 255, 0.65);
      border: 3px solid rgba(255, 255, 255, 0.85);
      border-radius: 34px;

      box-shadow:
        0 20px 50px rgba(80, 60, 0, 0.18);
    }

    .welcome-gif {
      width: 100%;
      height: 100%;

      display: block;
      object-fit: cover;
    }

    .welcome-title {
      margin: 28px 0 8px;

      font-size: clamp(38px, 8vw, 58px);
      font-weight: 800;
      line-height: 1.1;
    }

    .welcome-text {
      margin: 0;

      color: #65581f;
      font-size: 17px;
      line-height: 1.6;
    }

    .next-button {
      width: min(100%, 330px);
      min-height: 58px;

      margin-top: 32px;
      padding: 14px 24px;

      border: none;
      border-radius: 999px;

      background: #222;
      color: white;

      font-size: 18px;
      font-weight: 700;

      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);

      cursor: pointer;

      transition:
        transform 0.15s ease,
        opacity 0.15s ease;
    }

    .next-button:hover {
      opacity: 0.88;
    }

    .next-button:active {
      transform: scale(0.96);
    }

    /* หน้าหลังจากกดต่อไป */
    .main-page {
      min-height: 100svh;

      padding:
        calc(30px + env(safe-area-inset-top))
        22px
        calc(30px + env(safe-area-inset-bottom));

      display: flex;
      justify-content: center;
      align-items: center;

      background:
        linear-gradient(
          135deg,
          #f8f8f8,
          #eeeeee
        );
    }

    .main-card {
      width: 100%;
      max-width: 520px;
      padding: 36px 26px;

      text-align: center;

      background: white;
      border-radius: 28px;

      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.12);
    }

    .main-card h2 {
      margin: 0 0 12px;
      font-size: 30px;
    }

    .main-card p {
      margin: 0;

      color: #666;
      font-size: 17px;
      line-height: 1.7;
    }

    /* ปรับสำหรับหน้าจอคอม */
    @media (min-width: 768px) {
      .gif-container {
        width: 360px;
      }

      .welcome-title {
        font-size: 58px;
      }

      .welcome-text {
        font-size: 19px;
      }

      .next-button {
        width: 330px;
      }
    }
  </style>
</head>

<body>

  <!-- หน้าแรก -->
  <section
    class="welcome-page"
    id="welcomePage"
  >
    <div class="gif-container">
      <img
        class="welcome-gif"
        src="1.gif"
        alt="ภาพต้อนรับ"
      >
    </div>

    <h1 class="welcome-title">
      สวัสดี
    </h1>

    <p class="welcome-text">
      ยินดีต้อนรับ 🌻
    </p>

    <button
      class="next-button"
      type="button"
      onclick="goToNextPage()"
    >
      ต่อไป
    </button>
  </section>

  <!-- หน้าถัดไป -->
  <main class="main-page">
    <section class="main-card">
      <h2>หน้าหลัก 🌻</h2>

      <p>
        หน้านี้จะแสดงหลังจากกดปุ่มต่อไป
      </p>
    </section>
  </main>

  <script>
    function goToNextPage() {
      const welcomePage =
        document.getElementById("welcomePage");

      welcomePage.classList.add("hide");
    }
  </script>

</body>
</html>
