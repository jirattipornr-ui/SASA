<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">

  <!-- ทำให้เว็บไซต์พอดีกับหน้าจอโทรศัพท์ -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>เว็บไซต์ของซา</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px;

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff6bf, #ffd868);
      color: #292929;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 36px 24px;

      text-align: center;
      background-color: white;

      border-radius: 24px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.15);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 32px;
    }

    p {
      margin-bottom: 24px;
      font-size: 18px;
      line-height: 1.6;
    }

    button {
      padding: 14px 26px;

      border: none;
      border-radius: 999px;

      background-color: #252525;
      color: white;

      font-size: 17px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    button:active {
      transform: scale(0.96);
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>สวัสดีค่ะ 🌻</h1>

    <p>
      นี่คือเว็บไซต์แรกของซา<br>
      เขียนด้วย Visual Studio Code
    </p>

    <button type="button" onclick="showMessage()">
      กดปุ่มนี้
    </button>
  </main>

  <script>
    function showMessage() {
      alert("เว็บไซต์ทำงานสำเร็จแล้ว 🎉");
    }
  </script>
</body>
</html>
